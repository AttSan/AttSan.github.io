<h2>Socials</h2>
<div class="card-container">
    {% for item in site.data.socials %}
    <div class="card">
      <div class="icon">
        <img src="./assets/img/socials/{{ item.logo }}">
      </div>
      <div class="info">
        <p class="title">{{ item.course }}</p>
        //<p class="location">{{ item.link }}</p>
        <a href="{{ item.url }}">{{ item.title }}</a>
        <p class="dates">{{ item.dates }}</p>
      </div>
    </div>
    {% endfor %}
</div>
